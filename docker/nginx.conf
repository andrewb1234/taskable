server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve the SPA. Fallback to index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST + SSE to the api container.
    # SSE requires chunked transfer + long keepalives, so we disable buffering
    # and proxy_read_timeout explicitly.
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
    }
}
