# Run from the repo root:
#   docker compose -f docker/docker-compose.yml up --build
#
# The MCP server is NOT containerized. Per docs/deployment.md, it runs
# locally via stdio and points at the api container's published port.

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    image: taskable-api:latest
    container_name: taskable-api
    restart: unless-stopped
    environment:
      AGENT_API_KEY: ${AGENT_API_KEY:?Set AGENT_API_KEY in .env}
      GITHUB_PAT: ${GITHUB_PAT:-}
      DATABASE_URL: sqlite:////app/data/taskable.db
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data
    networks:
      - copilot_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    image: taskable-web:latest
    container_name: taskable-web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - copilot_net

networks:
  copilot_net:
    driver: bridge

volumes:
  sqlite_data:
    driver: local
