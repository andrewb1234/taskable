[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = api/tests
python_files = test_*.py
addopts = -v --strict-markers
markers =
    integration: end-to-end tests that boot real uvicorn/MCP subprocesses
filterwarnings =
    # pytest-asyncio on Python 3.14 emits DeprecationWarnings from its own
    # internal policy save/restore (lines 966 and 978 of plugin.py).
    # We don't own those call sites and can't silence them via pattern-based
    # filters because pytest_asyncio installs a sys.warnings filter earlier
    # in the boot sequence. Keeping the warnings visible until pytest-asyncio
    # lands a 3.14 fix (tracked in learnings.md, 2026-04-17).
    ignore::DeprecationWarning:asyncio
